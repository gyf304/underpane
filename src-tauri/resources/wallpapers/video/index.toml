name = "Video"

[config.source]
type = "file"
name = "Video File"
group = "Source"
description = "The video file to play as your wallpaper."
extensions = ["mp4", "webm", "mov", "m4v", "ogv", "ogg"]

[config.fill_screen]
type = "bool"
name = "Fill Screen"
group = "Display"
description = "Crop the video to cover the whole screen. Disable to fit the entire video (letterboxed)."
default = true

[config.muted]
type = "bool"
name = "Muted"
group = "Audio"
description = "Mute the video. Unmuting may prevent autoplay on some systems."
default = true

[config.loop]
type = "bool"
name = "Loop"
group = "Playback"
description = "Restart the video when it reaches the end."
default = true

[config.playback_rate]
type = "number"
name = "Playback Speed"
group = "Playback"
description = "Video playback speed multiplier."
default = 1.0
min = 0.1
max = 4.0
step = 0.1

[config.pause_when_hidden]
type = "bool"
name = "Pause When Hidden"
group = "Performance"
description = "Pause playback while the desktop is fully covered by other windows."
default = true
