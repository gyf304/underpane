name = "Synthwave Canyon"

[config.speed]
type = "number"
name = "Speed"
group = "Animation"
description = "Animation playback speed"
default = 1.0
min = 0.0
max = 5.0
step = 0.1

[config.fps_limit]
type = "bool"
name = "Limit FPS"
group = "Performance"
description = "Cap the render frame rate"
default = false

[config.fps]
type = "number"
name = "Max FPS"
group = "Performance"
description = "Frame rate cap when 'Limit FPS' is enabled"
default = 60
min = 1
max = 240
step = 1

[config.scale]
type = "number"
name = "Render Scale"
group = "Quality"
description = "Internal render resolution as a fraction of window size; lower is faster, at the cost of quality."
default = 0.75
min = 0.1
max = 1.0
step = 0.05

[config.pause_when_hidden]
type = "bool"
name = "Pause When Hidden"
group = "Performance"
description = "Stop animating while the desktop is fully covered by other windows"
default = true
