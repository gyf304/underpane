<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Underpane brings your desktop to life with animated, interactive wallpapers on macOS and Windows, with per-monitor configuration."
    />
    <link rel="icon" type="image/png" href="../favicon.png" />
    <title>Underpane — Live Wallpapers</title>
    <script>
      (function () {
        const isDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.classList.toggle("dark", isDark);
      })();
    </script>
    <script type="module" src="./index.tsx" async></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
