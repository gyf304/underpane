name: Publish Underpane Wallpaper
description: Zips a wallpaper dist directory and attaches it to a draft GitHub release named after the tag.
inputs:
  dist-dir:
    description: Directory containing the built wallpaper
    required: false
    default: ./dist
  index-toml:
    description: Path to the wallpaper manifest (must exist)
    required: false
    default: ./dist/index.toml
  name:
    description: Override the asset/release base name (defaults to the repository name)
    required: false
    default: ""
  version:
    description: Override the version. When set, the action runs regardless of ref type; the release is created/updated with this as its tag.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - shell: bash
      env:
        DIST_DIR: ${{ inputs.dist-dir }}
        INDEX_TOML: ${{ inputs.index-toml }}
        INPUT_NAME: ${{ inputs.name }}
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        if [[ -n "$INPUT_VERSION" ]]; then
          version="$INPUT_VERSION"
        else
          if [[ "${GITHUB_REF:-}" != refs/tags/* ]]; then
            echo "Not a tag ref (${GITHUB_REF:-<none>}) and no 'version' input; skipping publish."
            exit 0
          fi
          version="${GITHUB_REF#refs/tags/}"
        fi
        [[ -d "$DIST_DIR" ]]   || { echo "dist-dir not found: $DIST_DIR" >&2; exit 1; }
        [[ -f "$INDEX_TOML" ]] || { echo "index-toml not found: $INDEX_TOML" >&2; exit 1; }
        name="${INPUT_NAME:-${GITHUB_REPOSITORY##*/}}"
        asset="${RUNNER_TEMP}/${name}_${version}.underpane.zip"
        staging="$(mktemp -d)"
        cp -R "$DIST_DIR"/. "$staging"/
        cp "$INDEX_TOML" "$staging/index.toml"
        (cd "$staging" && zip -r "$asset" .)
        if gh release view "$version" >/dev/null 2>&1; then
          gh release upload "$version" "$asset" --clobber
        else
          gh release create "$version" "$asset" \
            --draft --title "$version" --target "$GITHUB_SHA"
        fi
