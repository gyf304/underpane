<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Synthwave Canyon</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: #000;
            }
            canvas {
                display: block;
                width: 100%;
                height: 100%;
            }
        </style>
    </head>
    <body>
        <canvas id="c"></canvas>
        <script>
            const canvas = document.getElementById("c");
            const gl = canvas.getContext("webgl2");
            if (!gl) {
                document.body.innerHTML =
                    '<p style="color:white;padding:2rem">WebGL 2 not supported</p>';
            }

            // Shared fullscreen quad vertex shader. Passes a UV to the fragment shader.
            const VS = `#version 300 es
in vec2 a_pos;
out vec2 v_uv;
void main() {
  v_uv = a_pos * 0.5 + 0.5;
  gl_Position = vec4(a_pos, 0.0, 1.0);
}
`;

            // Scene shader - renders the synthwave canyon at half resolution.
            const FS_SCENE = `#version 300 es
precision highp float;
uniform vec3  iResolution;
uniform float iTime;
uniform vec3  uColor;
out vec4 fragColor;

// from: https://www.shadertoy.com/view/3XdXRr, licensed under CC0, adapted

// CC0: Just another cube
// Glowtracers are great for compact coding, but I wanted to see how much
// I could squeeze a more normal raymarcher in terms of characters used.

// Twigl: https://twigl.app?ol=true&ss=-OW-y9xgRgWubwKcn0Nd

// == Globals ==
// Single-letter variable names are used to save characters (code golfing).
mat2 R;    // A 2D rotation matrix, calculated once per frame in mainImage and used by D.
float d=1. // Stores the most recent distance to the scene from the ray's position.
    , z    // Stores the total distance traveled along the ray.
    , G=9. // "Glow" variable. Tracks the closest the ray comes to the object (for volumetric glow effect).
    , M=1e-3
    ;
// == Distance Function (SDF - Signed Distance Field) ==
// This function calculates the shortest distance from a given point 'p' to the scene geometry.
// A positive result means the point is outside an object, negative is inside, and zero is on the surface.
// This is the core of "raymarching", as it tells us the largest safe step we can take along a ray.
float D(vec3 p) {
  // Apply two rotations to the point's coordinates. This twists the space the object
  // exists in, making the simple cube shape appear more complex and animated.
  p.xy *= R;
  p.xz *= R;

  // Create a higher-frequency version of the coordinate for detailed surface patterns.
  vec3 S = sin(123.*p);

  // This creates a volumetric glow effect by tracking the minimum distance
  // to either the existing glow value or a glowing shell around the object.
  G = min(
      G
      // The glowing shell
    , max(
        abs(length(p)-.6)
        // The main object distance calculation:
        // 1. A superquadric (rounded cube shape) is created using an L8-norm.
        // The expression pow(dot(p=p*p*p*p,p),.125) is a golfed version of
        // pow(pow(p.x,8)+pow(p.y,8)+pow(p.z,8), 1./8.).
        // The - .5 defines the object's size.
      , d = pow(dot(p*=p*p*p,p),.125) - .5
        // 2. Surface detail subtraction. This creates small surface variations
        // using high-frequency sine waves for more appealing reflections.
        // - pow(1.+S.x*S.y*S.z,8.)/1e5
      )
    );

  return d;
}

// == Main Render Function ==
// This function is called for every pixel on the screen to determine its color.
// 'o' is the final output color (rgba). 'C' is the input pixel coordinate (xy).
void mainImage(out vec4 o, vec2 C) {
  // Single-letter variable names are used to save characters (code golfing).
  vec3  p  // The current point in 3D space along the ray.
      , O  // Multi-purpose vector: color accumulator, then normal vector, then final color.
      , r=iResolution  // 'r' holds screen resolution, later re-used for the epsilon vector and reflection.
        // 'I' is the Ray Direction vector. It's calculated once per pixel.
        // This converts the 2D screen coordinate 'C' into a 3D direction, creating the camera perspective.
        , I=normalize(vec3(C-.5*r.xy, r.y))
        // Base color seed: drives the sky, floor, rim light and glow, so the
        // user color recolors the entire scene. *9 matches the original vec3(1,2,9).
      , B=uColor*9.*M
      ;

  // == Raymarching Loop ==
  // This loop "marches" a ray from the camera out into the scene to find what it hits.
  // It uses a golfed structure where the body of the loop updates the ray position 'p',
  // and the "advancement" step moves the ray forward.
  for(
        // -- Initializer (runs once before the loop) --
        // Calculate the rotation matrix for this frame based on time.
        R = mat2(cos(.3*iTime+vec4(0,11,33,0)))
    // -- Condition --
    // Loop while total distance 'z' is less than 9 and we are not yet touching a surface (d > 1e-3).
    ; z<9. && d > M
    // -- Advancement --
    // The ray advances by the safe distance 'd' returned by D(p).
    // The result of D(p) is also assigned to the global 'd' inside the function.
    ; z += D(p)
    )
    // -- Loop Body --
    // Calculate the current position 'p' in world space.
    // The camera starts at (0,0,-2) and points forward.
    p = z*I
  , p.z -= 2.
  ;

  // -- Hit Condition --
  // If the loop finished because z exceeded the max distance, we hit nothing. Otherwise, we hit the surface.
  if (z < 9.) {
    // -- Calculate Surface Normal --
    // Estimate the gradient ∇D at the hit point 'p' via central differences on the SDF D.
    // We use ε = 1e-3 and loop over each axis (x, y, z):
    //   • Zero r, then set r[i] = ε.
    //   • Compute O[i] = D(p + r) – D(p – r).
    // After the loop, O holds the unnormalized normal vector.
    for (
        int i                 // axis index: 0→x, 1→y, 2→z
      ; i < 3
      ; O[i++] = D(p+r) - D(p-r)
      )
        r -= r                // clear r to vec3(0)
      , r[i] = M              // set only the i-th component
      ;

    // -- Lighting and Shading --
    // 'z' is re-purposed to store a fresnel factor (1 - cos(angle)) for edge brightness.
    // dot(O, I) calculates how much the surface faces away from the camera.
    // O is also normalized here to become a proper normal vector.
    z = 1.+dot(O = normalize(O),I);

    // 'r' is re-purposed to store the reflection vector.
    r = reflect(I,O);

    // Calculate a point 'C' along the reflection vector 'r' to sample a background color.
    // For upward reflections (r.y > 0), this finds the intersection with the plane y=5.
    C = (p+r*(5.-p.y)/abs(r.y)).xz;

    // Calculate the final color 'O' of the hit point.
    O =
        // Multiply by the fresnel factor squared for stronger edge reflections.
        z*z *
        // Use a ternary operator to decide the color based on where the reflection ray goes.
        (
            // If the reflection vector points upward...
            r.y>0.
            // ...sample a procedural "sky" with a radial gradient and blue tint.
          ? 5e2*smoothstep(5., 4., d = sqrt(length(C*C))+1.)*d*B
            // ...otherwise, sample a "floor" with a deep blue exponential falloff.
          : exp(-2.*length(C))*(B/M-1.)
        )
      // Add rim lighting (brighter on upward-facing surfaces).
      + pow(1.+O.y,5.)*B
      ;
  }

  // == Tonemapping & Output ==
  // Apply final effects and map the High Dynamic Range (HDR) color to a displayable range.
  // Add glow contribution: smaller G values (closer ray passes) create a brighter blue glow.
  o = sqrt(O+B/G).xyzx;
}

void main() {
  vec4 o;
  mainImage(o, gl_FragCoord.xy);
  fragColor = o;
}
`;

            // CAS upscale shader - runs at full resolution, reads from the half-res texture.
            //
            // AMD Contrast Adaptive Sharpening (simplified for WebGL 1.0):
            // Samples the 5-tap cross neighbourhood, computes a local luma min/max,
            // derives a sharpening weight that is strongest in low-contrast regions and
            // falls off where contrast is already high (preventing oversharpening on
            // bright neon edges). The centre pixel is then blended toward the sharpened
            // result. uSharpness=0 is maximum sharpening, uSharpness=1 is a no-op.
            const FS_CAS = `#version 300 es
precision highp float;
in vec2 v_uv;
uniform sampler2D uTex;
uniform vec2  uTexelSize;  // 1.0 / half-res dimensions
uniform float uSharpness;  // 0 = sharpest, 1 = off  (AMD convention)
out vec4 fragColor;

void main() {
  // 5-tap cross: centre + N/S/E/W
  vec3 a = texture(uTex, v_uv + uTexelSize * vec2( 0.0, -1.0)).rgb;
  vec3 b = texture(uTex, v_uv + uTexelSize * vec2(-1.0,  0.0)).rgb;
  vec3 c = texture(uTex, v_uv                                 ).rgb;
  vec3 d = texture(uTex, v_uv + uTexelSize * vec2( 1.0,  0.0)).rgb;
  vec3 e = texture(uTex, v_uv + uTexelSize * vec2( 0.0,  1.0)).rgb;

  // Perceived luma for each tap
  const vec3 lw = vec3(0.2126, 0.7152, 0.0722);
  float la = dot(a, lw);
  float lb = dot(b, lw);
  float lc = dot(c, lw);
  float ld = dot(d, lw);
  float le = dot(e, lw);

  // Local contrast range
  float mnL = min(min(min(la, lb), min(lc, ld)), le);
  float mxL = max(max(max(la, lb), max(lc, ld)), le);

  // CAS weight: peaks where contrast is low, fades where it is high.
  // sqrt maps the weight to a perceptually linear feel.
  float w = sqrt(min(mnL, 1.0 - mxL) / (mxL + 1e-4));
  // Sharpness control maps [0,1] -> [-0.125, -0.2] kernel weight
  w *= mix(-0.125, -0.2, 1.0 - uSharpness);

  // Unsharp-mask style blend: centre gets (1 - 4w), neighbours share 4w.
  // When w is negative the neighbours pull the centre up (sharpening).
  vec3 col = clamp(c*(1.0 - 4.0*w) + (a + b + d + e)*w, 0.0, 1.0);

  fragColor = vec4(col, 1.0);
}
`;

            // ---- GL helpers ----
            function compileShader(gl, type, src) {
                const s = gl.createShader(type);
                gl.shaderSource(s, src);
                gl.compileShader(s);
                if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
                    console.error(gl.getShaderInfoLog(s));
                return s;
            }

            function buildProgram(gl, fsSrc) {
                const vs = compileShader(gl, gl.VERTEX_SHADER, VS);
                const fs = compileShader(gl, gl.FRAGMENT_SHADER, fsSrc);
                const p = gl.createProgram();
                gl.attachShader(p, vs);
                gl.attachShader(p, fs);
                gl.linkProgram(p);
                if (!gl.getProgramParameter(p, gl.LINK_STATUS))
                    console.error(gl.getProgramInfoLog(p));
                return p;
            }

            // Shared quad buffer; must re-bind attrib pointer when switching programs.
            const quadBuf = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
            gl.bufferData(
                gl.ARRAY_BUFFER,
                new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]),
                gl.STATIC_DRAW,
            );

            function bindQuad(prog) {
                gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
                const loc = gl.getAttribLocation(prog, "a_pos");
                gl.enableVertexAttribArray(loc);
                gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
            }

            // ---- programs ----
            const sceneProg = buildProgram(gl, FS_SCENE);
            const casProg = buildProgram(gl, FS_CAS);

            // scene uniforms
            const uRes = gl.getUniformLocation(sceneProg, "iResolution");
            const uTime = gl.getUniformLocation(sceneProg, "iTime");
            const uColor = gl.getUniformLocation(sceneProg, "uColor");

            // CAS uniforms
            const uTex = gl.getUniformLocation(casProg, "uTex");
            const uTexelSize = gl.getUniformLocation(casProg, "uTexelSize");
            const uSharpness = gl.getUniformLocation(casProg, "uSharpness");

            // ---- half-res FBO ----
            let halfW = 1,
                halfH = 1,
                fbo,
                fbTex;

            function createFBO(w, h) {
                if (fbo) {
                    gl.deleteFramebuffer(fbo);
                    gl.deleteTexture(fbTex);
                }
                fbTex = gl.createTexture();
                gl.bindTexture(gl.TEXTURE_2D, fbTex);
                gl.texImage2D(
                    gl.TEXTURE_2D,
                    0,
                    gl.RGBA,
                    w,
                    h,
                    0,
                    gl.RGBA,
                    gl.UNSIGNED_BYTE,
                    null,
                );
                // LINEAR is intentional: the CAS pass does its own neighbourhood sampling,
                // but the GPU's linear filter still helps during the UV->texel mapping.
                gl.texParameteri(
                    gl.TEXTURE_2D,
                    gl.TEXTURE_MIN_FILTER,
                    gl.LINEAR,
                );
                gl.texParameteri(
                    gl.TEXTURE_2D,
                    gl.TEXTURE_MAG_FILTER,
                    gl.LINEAR,
                );
                gl.texParameteri(
                    gl.TEXTURE_2D,
                    gl.TEXTURE_WRAP_S,
                    gl.CLAMP_TO_EDGE,
                );
                gl.texParameteri(
                    gl.TEXTURE_2D,
                    gl.TEXTURE_WRAP_T,
                    gl.CLAMP_TO_EDGE,
                );
                fbo = gl.createFramebuffer();
                gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
                gl.framebufferTexture2D(
                    gl.FRAMEBUFFER,
                    gl.COLOR_ATTACHMENT0,
                    gl.TEXTURE_2D,
                    fbTex,
                    0,
                );
                gl.bindFramebuffer(gl.FRAMEBUFFER, null);
            }

            function readHashFloat(key, fallback) {
                const v = parseFloat(
                    new URLSearchParams(location.hash.slice(1)).get(key),
                );
                return Number.isFinite(v) ? v : fallback;
            }
            function readHashBool(key, fallback) {
                const v = new URLSearchParams(location.hash.slice(1)).get(key);
                if (v === null) return fallback;
                return v === "true" || v === "1";
            }
            function readHashColor(key, fallback) {
                const v = new URLSearchParams(location.hash.slice(1)).get(key);
                const m = /^#([0-9a-fA-F]{6}|[0-9a-fA-F]{8})$/.exec(v || "");
                if (!m) return fallback;
                const h = m[1];
                return {
                    r: parseInt(h.slice(0, 2), 16) / 255,
                    g: parseInt(h.slice(2, 4), 16) / 255,
                    b: parseInt(h.slice(4, 6), 16) / 255,
                };
            }
            function readSpeed() {
                return readHashFloat("speed", 1.0);
            }
            function readScale() {
                const s = readHashFloat("scale", 0.75);
                return Math.min(1.0, Math.max(0.1, s));
            }
            function readFpsLimit() {
                return Math.max(1, readHashFloat("fps", 60));
            }
            function readFpsLimitEnabled() {
                return readHashBool("fps_limit", false);
            }
            function readPauseWhenHidden() {
                return readHashBool("pause_when_hidden", true);
            }
            function readSharpness() {
                const s = readHashFloat("sharpness", 0.8);
                return Math.min(1.0, Math.max(0.0, s));
            }
            function readColor() {
                return readHashColor("color", { r: 1 / 9, g: 2 / 9, b: 1 });
            }

            let speed = readSpeed();
            let scale = readScale();
            let fpsLimit = readFpsLimit();
            let fpsLimitEnabled = readFpsLimitEnabled();
            let pauseWhenHidden = readPauseWhenHidden();
            let sharpness = readSharpness();
            let color = readColor();

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                halfW = Math.max(1, Math.floor(canvas.width * scale));
                halfH = Math.max(1, Math.floor(canvas.height * scale));
                createFBO(halfW, halfH);
            }

            window.addEventListener("resize", resize);
            resize();

            window.addEventListener("hashchange", () => {
                speed = readSpeed();
                fpsLimit = readFpsLimit();
                fpsLimitEnabled = readFpsLimitEnabled();
                pauseWhenHidden = readPauseWhenHidden();
                sharpness = readSharpness();
                color = readColor();
                const newScale = readScale();
                if (newScale !== scale) {
                    scale = newScale;
                    resize();
                }
            });

            let simTime = 0;
            let lastReal = performance.now();
            let nextDraw = 0;

            function frame() {
                const nowReal = performance.now();

                if (pauseWhenHidden && document.visibilityState === "hidden") {
                    lastReal = nowReal;
                    nextDraw = 0;
                    requestAnimationFrame(frame);
                    return;
                }

                const dt = (nowReal - lastReal) / 1000;
                lastReal = nowReal;
                // Loop simTime at the exact shader period (cos(0.3*iTime+...)) so fp32
                // precision in the GL uniform stays high during multi-hour runs.
                simTime = (simTime + dt * speed) % ((2 * Math.PI) / 0.3);

                if (fpsLimitEnabled) {
                    const minInterval = 1000 / fpsLimit;
                    // Half-interval slack: rAF ticks land on the vsync grid, so a frame that
                    // arrives slightly *before* the deadline should still draw rather than
                    // get pushed to the next vsync (which causes the jitter).
                    if (nowReal + minInterval * 0.5 < nextDraw) {
                        requestAnimationFrame(frame);
                        return;
                    }
                    // Advance schedule by whole intervals; clamp if we fell far behind so we
                    // don't burst-render to catch up.
                    if (
                        nextDraw === 0 ||
                        nowReal - nextDraw > minInterval * 2
                    ) {
                        nextDraw = nowReal + minInterval;
                    } else {
                        nextDraw += minInterval;
                    }
                }
                const t = simTime;

                // Pass 1: render scene at half resolution into the FBO.
                gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
                gl.viewport(0, 0, halfW, halfH);
                gl.useProgram(sceneProg);
                bindQuad(sceneProg);
                gl.uniform3f(uRes, halfW, halfH, 1.0);
                gl.uniform1f(uTime, t);
                gl.uniform3f(uColor, color.r, color.g, color.b);
                gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

                // Pass 2: CAS upscale from half-res texture to full canvas.
                gl.bindFramebuffer(gl.FRAMEBUFFER, null);
                gl.viewport(0, 0, canvas.width, canvas.height);
                gl.useProgram(casProg);
                bindQuad(casProg);
                gl.activeTexture(gl.TEXTURE0);
                gl.bindTexture(gl.TEXTURE_2D, fbTex);
                gl.uniform1i(uTex, 0);
                gl.uniform2f(uTexelSize, 1.0 / halfW, 1.0 / halfH);
                gl.uniform1f(uSharpness, 1.0 - sharpness);
                gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

                requestAnimationFrame(frame);
            }

            requestAnimationFrame(frame);
        </script>
    </body>
</html>
